name: Build Web-Installer

on:
  push:
    tags:
      - 'v*' # Se déclenche quand tu pousses un tag (ex: v1.0.0)

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install customtkinter requests pillow PyInstaller

      - name: Build Installer EXE
        run: |
          pyinstaller --noconfirm --onefile --windowed --name="Multivers_Installer" --icon="assets/app_icon.ico" --add-data="assets;assets/" multivers_installer.py

      - name: Build Core Archives
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python build.py
          python pack_installer.py

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Multivers_Installer.exe
            build_installer/data/core.zip
            build_installer/data/ffmpeg.zip
          fail_on_unmatched_files: true
          name: Multivers Suite Release ${{ github.ref_name }}
          body: |
            🚀 Nouvelle mise à jour du Multivers !
            
            Cette release contient le **Web-Installer** permettant d'installer et de mettre à jour le système.
            
            **Instructions :**
            1. Téléchargez `Multivers_Installer.exe`.
            2. Lancez-le directement.
            3. L'installateur téléchargera automatiquement les dépendances requises (core.zip, ffmpeg.zip).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
